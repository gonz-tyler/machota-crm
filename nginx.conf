events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend_api {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost; # Replace with your production domain name

        # 1. SERVE COMPILED REACT FRONTEND ASSETS
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # 2. IMMUTABLE WEASYPRINT PDF MEDIA ACCESS
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            
            # Allows your React frontend iframes to display these accounting assets securely
            always_set_header X-Frame-Options "SAMEORIGIN";
        }

        # 3. DJANGO STATIC ASSETS (ADMIN PORTAL SHEETS)
        location /static/ {
            alias /app/static/;
            expires 30d;
        }

        # 4. FORWARD API TRAFFIC TO GUNICORN
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. FORWARD DJANGO ADMIN TRAFFIC
        location /admin/ {
            proxy_pass http://backend_api;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}